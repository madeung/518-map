              a: "단순히 과거를 기억하는 데 그치지 않고, 학생들과 시민들이 직접 참여하고 공감할 수 있는 행사로 계속 이어졌으면 합니다. 특히 젊은 세대가 자연스럽게 5·18 정신을 이해하고 이어갈 수 있도록 다양한 방식으로 소통할 수 있는 문화와 참여 중심의 행사로 발전해가길 바랍니다."

        }
      ],
      citizenInterviews: [

          type: "전남대 5·18 기념행사 참여 학생",

              a: "그동안 5.18에 대해 크게 생각해 볼 기회가 없었는데, 이번 행사에 참여하면서 직접 질문을 뽑고 답변하는 활동을 통해 5.18에 대해 더 깊게 생각해 보게 되었습니다. 특히 민주주의가 당연하게 이루어진 것이 아니라 많은 사람의 희생과 노력으로 만들어졌다는 점을 느낄 수 있었고, 당시 민주주의를 위해 힘써주셨던 분들에게 다시 한번 감사한 마음을 가지게 된 것 같습니다."
            },
            {
              q: "참여하기 전과 후에 5·18에 대한 생각이나 느낌이 달라진 부분이 있나요?",
              a: "참여하기 전에도 5·18에 대해 관심이 많아서 잘 알고 있었습니다. 참여한 후에는 과거 전남대 선배님분들이 5·18 당시 희생하며 민주주의를 위해 직접 맞서 싸우셨다는 사실이 더욱 깊이 와닿았습니다. 지금의 저와 비슷한 나이의 청년들이 두려움 속에서도 용기를 냈다는 점이 정말 인상 깊었고, 이러한 숭고한 희생이 있기에 지금의 민주주의가 있다고 생각하게 되었습니다."
            },
            {
              q: "이번 경험을 한 문장으로 표현한다면?",
              a: "민주주의의 의미와 소중함을 다시 한번 생각해 볼 수 있었던 뜻깊은 경험이었습니다."
            },
            {
              q: "전남대학교 행사 외 5·18 관련 다른 행사에도 참여할 의향이 있으신가요?",
              a: "네, 참여하고 싶습니다. 5·18 민주화 운동은 우리가 잊지 말아야 할 역사입니다. 앞으로도 다른 행사에도 참여하며 이 역사를 기억하고 싶습니다."

          ]
        }
      ]
    },
    {
      id: 'mangwol',
      name: "망월동 구묘역",
      lat: 35.2075,
      lng: 126.8840,
      category: "묘지/추모",
      subtitle: "최초 안장지 · 광주광역시 북구",
      significance: "5·18 희생자들이 처음 안장된 민주묘지 구묘역입니다. 국립묘지 이전에도 시민들이 자발적으로 찾아와 추모했던 광주 민주주의의 뿌리 깊은 상징적 공간입니다.",
      expertInterviews: [],
      citizenInterviews: []
    }
  ];

  var categoryColor = {
    "행사 현장": "#c0392b",
    "역사 현장": "#e67e22",
    "기록관": "#2980b9",
    "공원/기념관": "#27ae60",
    "묘지/추모": "#8e44ad"
  };

  var currentNearbyPlace = null;

  // 마커 생성
  places.forEach(function(place) {
    var markerImage = new kakao.maps.MarkerImage(
      'https://t1.daumcdn.net/localimg/localimages/07/mapapidoc/marker_red.png',
      new kakao.maps.Size(31, 35)
    );

    var marker = new kakao.maps.Marker({
      map: map,
      position: new kakao.maps.LatLng(place.lat, place.lng),
      title: place.name
    });

    kakao.maps.event.addListener(marker, 'click', function() {
      openModal(place);
    });
  });

  // 모달 열기
  function openModal(place) {
    document.getElementById('modal-tag').textContent = '🕊️ 기억의 장소';
    document.getElementById('modal-tag').style.background = categoryColor[place.category] || '#c0392b';
    document.getElementById('modal-title').textContent = place.name;
    document.getElementById('modal-subtitle').textContent = place.subtitle;

    var body = '';

    // 장소의 역사적 의미
    body += '<div class="modal-section">';
    body += '<div class="section-label">이 장소의 의미</div>';
    body += '<div class="significance-text">' + place.significance + '</div>';
    body += '</div>';

    // 전문가 인터뷰
    if (place.expertInterviews && place.expertInterviews.length > 0) {
      body += '<div class="modal-section">';
      body += '<div class="section-label">전문가 · 관계자 목소리</div>';
      place.expertInterviews.forEach(function(interview) {
        body += '<div class="interview-card">';
        body += '<div class="interview-meta">';
        body += '<div class="interview-avatar avatar-expert">' + interview.who.charAt(interview.who.length - 1) + '</div>';
        body += '<div><div class="interview-who">' + interview.who + '</div><div class="interview-type">' + interview.type + '</div></div>';
        body += '</div>';
        interview.qas.forEach(function(qa) {
          body += '<div class="qa-item">';
          body += '<div class="q-text">Q. ' + qa.q + '</div>';
          body += '<div class="a-text">' + qa.a + '</div>';
          body += '</div>';
        });
        body += '</div>';
      });
      body += '</div>';
    }

    // 시민 인터뷰
    if (place.citizenInterviews && place.citizenInterviews.length > 0) {
      body += '<div class="modal-section">';
      body += '<div class="section-label">시민들의 이야기</div>';
      place.citizenInterviews.forEach(function(interview) {
        body += '<div class="interview-card">';
        body += '<div class="interview-meta">';
        body += '<div class="interview-avatar avatar-citizen">👤</div>';
        body += '<div><div class="interview-who">' + interview.who + '</div><div class="interview-type">' + interview.type + '</div></div>';
        body += '</div>';
        interview.qas.forEach(function(qa) {
          body += '<div class="qa-item">';
          body += '<div class="q-text">Q. ' + qa.q + '</div>';
          body += '<div class="a-text">' + qa.a + '</div>';
          body += '</div>';
        });
        body += '</div>';
      });
      body += '</div>';
    }

    document.getElementById('modal-body').innerHTML = body;
    document.getElementById('modal-overlay').classList.add('show');
  }

  function closeModal(e) {
    if (e.target === document.getElementById('modal-overlay')) {
      document.getElementById('modal-overlay').classList.remove('show');
    }
  }

  function closeModalBtn() {
    document.getElementById('modal-overlay').classList.remove('show');
  }

  // GPS 내 위치 찾기
  function findMyLocation() {
    if (!navigator.geolocation) {
      alert('이 기기에서는 위치 서비스를 사용할 수 없습니다.');
      return;
    }
    var btn = document.getElementById('gps-btn');
    btn.textContent = '위치 찾는 중...';
    navigator.geolocation.getCurrentPosition(function(pos) {
      var lat = pos.coords.latitude;
      var lng = pos.coords.longitude;
      var myPos = new kakao.maps.LatLng(lat, lng);

      // 내 위치 마커
      new kakao.maps.Marker({
        map: map,
        position: myPos,
        title: '내 위치',
        image: new kakao.maps.MarkerImage(
          'https://t1.daumcdn.net/localimg/localimages/07/mapapidoc/markerStar.png',
          new kakao.maps.Size(24, 35)
        )
      });

      map.setCenter(myPos);
      map.setLevel(5);
      btn.textContent = '📍 내 위치';

      // 근처 장소 감지 (500m 이내)
      checkNearbyPlaces(lat, lng);

      // 지속 감지
      navigator.geolocation.watchPosition(function(p) {
        checkNearbyPlaces(p.coords.latitude, p.coords.longitude);
      }, null, { maximumAge: 10000, timeout: 5000 });

    }, function() {
      btn.textContent = '📍 내 위치';
      alert('위치 정보를 가져올 수 없습니다. 위치 권한을 허용해주세요.');
    });
  }

  function getDistance(lat1, lng1, lat2, lng2) {
    var R = 6371000;
    var dLat = (lat2 - lat1) * Math.PI / 180;
    var dLng = (lng2 - lng1) * Math.PI / 180;
    var a = Math.sin(dLat/2) * Math.sin(dLat/2) +
            Math.cos(lat1 * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180) *
            Math.sin(dLng/2) * Math.sin(dLng/2);
    return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
  }

  function checkNearbyPlaces(lat, lng) {
    var closest = null;
    var minDist = Infinity;
    places.forEach(function(place) {
      var dist = getDistance(lat, lng, place.lat, place.lng);
      if (dist < 500 && dist < minDist) {
        minDist = dist;
        closest = place;
      }
    });

    var alert = document.getElementById('nearby-alert');
    if (closest) {
      currentNearbyPlace = closest;
      document.getElementById('nearby-name').textContent = closest.name;
      alert.style.display = 'block';
    } else {
      alert.style.display = 'none';
      currentNearbyPlace = null;
    }
  }

  function openNearbyPlace() {
    if (currentNearbyPlace) openModal(currentNearbyPlace);
  }
</script>
