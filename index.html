<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>5.18 광주 행사 지도</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Noto Sans KR', sans-serif; }
    #header {
      background: #1a1a2e;
      color: white;
      padding: 16px 24px;
      text-align: center;
    }
    #header h1 { font-size: 20px; font-weight: 700; }
    #header p { font-size: 13px; color: #aaa; margin-top: 4px; }
    #map { width: 100%; height: calc(100vh - 70px); }
  </style>
</head>
<body>
  <div id="header">
    <h1>🕊️ 5.18 민주화운동 광주 행사 지도</h1>
    <p>광주광역시 주요 5.18 관련 장소</p>
  </div>
  <div id="map"></div>

  <script type="text/javascript" src="//dapi.kakao.com/v2/maps/sdk.js?appkey=f2ef92411685ecde2939f72c839c2b53"></script>
  <script>
    var container = document.getElementById('map');
    var options = {
      center: new kakao.maps.LatLng(35.1595, 126.8526), // 광주광역시 중심
      level: 7
    };
    var map = new kakao.maps.Map(container, options);

    // 지도 컨트롤 추가
    var zoomControl = new kakao.maps.ZoomControl();
    map.addControl(zoomControl, kakao.maps.ControlPosition.RIGHT);

    var mapTypeControl = new kakao.maps.MapTypeControl();
    map.addControl(mapTypeControl, kakao.maps.ControlPosition.TOPRIGHT);

    // 5.18 주요 장소 데이터
    var places = [
      {
        name: "국립 5·18 민주묘지",
        lat: 35.2100,
        lng: 126.8850,
        desc: "5·18 민주화운동 희생자들이 안장된 국립묘지",
        category: "묘지/추모"
      },
      {
        name: "5·18 민주화운동기록관",
        lat: 35.1467,
        lng: 126.9159,
        desc: "5·18 관련 기록물을 보관·전시하는 기록관",
        category: "기록관"
      },
      {
        name: "구 전남도청 (5·18 민주광장)",
        lat: 35.1490,
        lng: 126.9178,
        desc: "5·18 당시 시민군의 최후 항쟁지. 현재 5·18 민주광장으로 사용 중",
        category: "역사 현장"
      },
      {
        name: "광주 금남로",
        lat: 35.1490,
        lng: 126.9160,
        desc: "5·18 민주화운동의 중심 거리. 시민들의 시위가 집중된 곳",
        category: "역사 현장"
      },
      {
        name: "5·18 자유공원 (옛 상무대)",
        lat: 35.1522,
        lng: 126.8514,
        desc: "5·18 당시 시민들이 구금·고문받은 옛 상무대 영창을 복원한 공원",
        category: "공원/기념관"
      },
      {
        name: "망월동 묘역 (구묘역)",
        lat: 35.2075,
        lng: 126.8840,
        desc: "5·18 희생자들이 처음 안장된 민주묘지 구묘역",
        category: "묘지/추모"
      },
      {
        name: "전남대학교 정문",
        lat: 35.1757,
        lng: 126.9087,
        desc: "5·18 민주화운동의 발원지. 1980년 5월 18일 학생 시위가 시작된 곳",
        category: "역사 현장"
      },
      {
        name: "조선대학교",
        lat: 35.1393,
        lng: 126.9277,
        desc: "5·18 당시 학생들이 시위에 적극 참여한 대학",
        category: "역사 현장"
      }
    ];

    // 카테고리별 색상
    var categoryColor = {
      "묘지/추모": "#c0392b",
      "기록관": "#2980b9",
      "역사 현장": "#e67e22",
      "공원/기념관": "#27ae60"
    };

    // 인포윈도우
    var infowindow = new kakao.maps.InfoWindow({ zIndex: 1 });

    places.forEach(function(place) {
      var marker = new kakao.maps.Marker({
        map: map,
        position: new kakao.maps.LatLng(place.lat, place.lng),
        title: place.name
      });

      var content = '<div style="padding:12px 14px;min-width:200px;max-width:260px;font-family:sans-serif;">' +
        '<div style="font-weight:700;font-size:14px;margin-bottom:6px;">' + place.name + '</div>' +
        '<div style="display:inline-block;background:' + (categoryColor[place.category] || '#555') + ';color:white;font-size:11px;padding:2px 8px;border-radius:10px;margin-bottom:8px;">' + place.category + '</div>' +
        '<div style="font-size:12px;color:#444;line-height:1.6;">' + place.desc + '</div>' +
        '</div>';

      kakao.maps.event.addListener(marker, 'click', function() {
        infowindow.setContent(content);
        infowindow.open(map, marker);
      });
    });
  </script>
</body>
</html>
